name: Daily Web Scraper

on:
  schedule:
    # Runs daily at 18:30 UTC (which is exactly Midnight/12:00 AM IST)
    - cron: '30 18 * * *'
  # Allows you to manually trigger the scraper from the GitHub Actions tab anytime
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.11'
          cache: 'pip' # caching pip dependencies speeds up daily runs

      - name: Install System Dependencies for Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: |
          # Use xvfb-run to provide a virtual display for Chrome/DrissionPage
          xvfb-run python -m scraper.main
